name: Feature request
description: Suggest a bounded, privacy-preserving improvement
title: '[Feature]: '
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should be solved?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Include safety, privacy, compatibility, and resource tradeoffs.
    validations:
      required: true
  - type: checkboxes
    id: boundaries
    attributes:
      label: Boundary confirmation
      options:
        - label: This does not require arbitrary filesystem, shell, credential, or remote-control access from the MCP reviewer.
          required: true
