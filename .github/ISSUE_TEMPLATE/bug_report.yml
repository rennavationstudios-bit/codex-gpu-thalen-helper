name: Bug report
description: Report a reproducible helper, installer, CLI, or MCP problem
title: '[Bug]: '
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include credentials, auth files, private prompts/responses, private source, usernames, hostnames, or unredacted personal paths.
  - type: input
    id: version
    attributes:
      label: Helper version
      placeholder: 0.1.0-beta.3
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Redacted environment
      description: Windows version/architecture, GPU/driver, Ollama version, model tag, and auto-start choice.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction
      description: Minimal safe steps and exact error code.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected and actual behavior
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I removed credentials, private data, prompts/responses, usernames, hostnames, and personal paths.
          required: true
